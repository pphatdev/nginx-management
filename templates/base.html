<!DOCTYPE html>
<html lang="en" class="h-full">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}Nginx Management{% endblock %} — NginxUI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <link rel="stylesheet" href="/static/css/style.css" />
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: { 500: "#009639", 600: "#007a2f", 700: "#006025" }
                    }
                }
            }
        }
    </script>
</head>

<body class="h-full bg-gray-950 text-gray-100 flex">

    <!-- ── Sidebar ─────────────────────────────── -->
    <aside id="sidebar" class="w-64 flex-shrink-0 bg-gray-900 border-r border-gray-800 flex flex-col">

        <!-- Logo -->
        <div class="px-6 py-5 border-b border-gray-800 flex items-center gap-3">
            <div class="w-8 h-8 rounded-lg bg-brand-500 flex items-center justify-center">
                <i class="fa-solid fa-server text-white text-sm"></i>
            </div>
            <span class="text-lg font-bold tracking-tight">NginxUI</span>
        </div>

        <!-- Nav -->
        <nav class="flex-1 px-3 py-4 space-y-1 overflow-y-auto">
            <a href="/"
                class="nav-link {% if page == 'dashboard' %}active{% endif %} group flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium transition-colors">
                <i class="fa-solid fa-gauge-high w-4 text-center"></i>
                Dashboard
            </a>
            <a href="/servers"
                class="nav-link {% if page == 'servers' %}active{% endif %} group flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium transition-colors">
                <i class="fa-solid fa-globe w-4 text-center"></i>
                Virtual Hosts
            </a>
            <a href="/upstreams"
                class="nav-link {% if page == 'upstreams' %}active{% endif %} group flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium transition-colors">
                <i class="fa-solid fa-network-wired w-4 text-center"></i>
                Upstreams
            </a>
            <a href="/config"
                class="nav-link {% if page == 'config' %}active{% endif %} group flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium transition-colors">
                <i class="fa-solid fa-file-code w-4 text-center"></i>
                Config Editor
            </a>

            <div class="pt-4 pb-1 px-3">
                <p class="text-xs font-semibold text-gray-500 uppercase tracking-widest">Tools</p>
            </div>

            <button onclick="reloadNginx()"
                class="nav-link w-full text-left group flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium transition-colors">
                <i class="fa-solid fa-rotate w-4 text-center"></i>
                Reload Nginx
            </button>
        </nav>

        <!-- Footer -->
        <div class="px-4 py-3 border-t border-gray-800 text-xs text-gray-500 flex items-center gap-2">
            <span class="inline-block w-2 h-2 rounded-full bg-emerald-400 animate-pulse"></span>
            Nginx running
        </div>
    </aside>

    <!-- ── Main ─────────────────────────────────── -->
    <div class="flex-1 flex flex-col overflow-hidden">

        <!-- Topbar -->
        <header class="h-14 border-b border-gray-800 bg-gray-900 flex items-center justify-between px-6 flex-shrink-0">
            <h1 class="text-sm font-semibold text-gray-300">{% block heading %}{% endblock %}</h1>
            <div class="flex items-center gap-3">
                <span id="last-reload" class="text-xs text-gray-500"></span>
                <button onclick="reloadNginx()"
                    class="inline-flex items-center gap-2 px-3 py-1.5 rounded-md bg-brand-500 hover:bg-brand-600 text-white text-xs font-medium transition-colors">
                    <i class="fa-solid fa-rotate"></i> Reload
                </button>
            </div>
        </header>

        <!-- Content -->
        <main class="flex-1 overflow-y-auto p-6">
            {% block content %}{% endblock %}
        </main>
    </div>

    <!-- ── Toast ──────────────────────────────────── -->
    <div id="toast" class="fixed bottom-6 right-6 z-50 hidden">
        <div class="flex items-center gap-3 bg-gray-800 border border-gray-700 text-sm px-4 py-3 rounded-xl shadow-2xl">
            <i id="toast-icon" class="fa-solid fa-circle-check text-emerald-400"></i>
            <span id="toast-msg">Done</span>
        </div>
    </div>

    <script src="/static/js/app.js"></script>
    {% block scripts %}{% endblock %}
</body>

</html>
